name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve site URL & base path
        id: site
        run: |
          # GITHUB_REPOSITORY is "<owner>/<repo>"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY##*/}"
          # If the repo is "<owner>.github.io" we deploy at root, otherwise at /<repo>/
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "site=https://${OWNER}.github.io" >> "$GITHUB_OUTPUT"
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "site=https://${OWNER}.github.io" >> "$GITHUB_OUTPUT"
            echo "base=/${REPO}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build site
        env:
          SITE: ${{ steps.site.outputs.site }}
          BASE: ${{ steps.site.outputs.base }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
